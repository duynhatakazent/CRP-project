<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello - Sign-Up</title>
    <link rel="stylesheet" href="../landing/landingpage.css">
    <link rel="stylesheet" href="auth.css">
</head>
<body class="stars">
    <div class="particles">
        <div class="diamond" style="--size:6px; left:15%;"></div>
        <div class="diamond" style="--size:10px; left:35%;"></div>
        <div class="diamond" style="--size:4px; left:60%;"></div>
        <div class="diamond" style="--size:8px; left:85%;"></div>
    </div>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <img src="../Resources/Logo.png" alt="Logo" class="mini-logo">
                <h2 id="auth-title">Join the Galaxy</h2>
                <p id="auth-subtitle">Start organizing your constellations.</p>
            </div>

            <form id="auth-form">
                <div class="input-group">
                    <input type="text" id="full-name" placeholder="Full Name" required>
                </div>
                <div class="input-group">
                    <input type="email" id="email" placeholder="Email Address" required>
                </div>
                <div id="email-error" class="error-message"></div>
                <div class="input-group">
                    <input type="password" id="password" placeholder="Password" required>
                </div>
                <div class="input-group">
                    <input type="password" id="confirm-password" placeholder="Confirm Password" required>
                </div>
                <div id="password-error" class="error-message"></div>
                <div id="password-policy" class="password-policy-container">
                    <p>Password must contain:</p>
                    <ul>
                        <li id="policy-length">At least 8 characters</li>
                        <li id="policy-uppercase">An uppercase letter</li>
                        <li id="policy-lowercase">A lowercase letter</li>
                        <li id="policy-number">A number</li>
                    </ul>
                </div>
                <button type="submit" id="submit-btn" class="btn primary full-width">Create Universe</button>
            </form>

            <div class="auth-footer">
                <span>Already a star?</span>
                <a href="../signin/index.html">Sign In</a>
            </div>
        </div>
    </div>

    <script src="../landing/landingpage.js"></script>
    <script src="signup.js"></script>
</body>
</html>
