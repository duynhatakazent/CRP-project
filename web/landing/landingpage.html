<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello – Organize Your Universe</title>
  <link rel="stylesheet" href="landingpage.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body class="stars">

  <div class="particles">
    <div class="diamond" style="--size:6px; left:10%; animation-duration:18s"></div>
    <div class="diamond" style="--size:10px; left:25%; animation-duration:22s"></div>
    <div class="diamond" style="--size:4px; left:40%; animation-duration:20s"></div>
    <div class="diamond" style="--size:12px; left:55%; animation-duration:26s"></div>
    <div class="diamond" style="--size:5px; left:70%; animation-duration:19s"></div>
    <div class="diamond" style="--size:9px; left:85%; animation-duration:24s"></div>
  </div>

  <header>
    <div class="orbit"></div>
    <img src="../Resources/Logo.png" alt="Hello logo" class="logo" />
    <p>Organize tasks like constellations — everything in its orbit, nothing out of place.</p>
    <div class="cta">
      <button class="btn primary">Get Started</button>
      <button class="btn">Live Demo</button>
    </div>
  </header>

  <section>
    <h2>Your Board, Your Galaxy</h2>
    <div class="board">
      <div class="column">
        <h3>Ideas</h3>
        <div class="card">Landing page concept</div>
        <div class="card">New animation style</div>
      </div>
      <div class="column">
        <h3>In Progress</h3>
        <div class="card">Frontend layout</div>
        <div class="card">Micro-interactions</div>
      </div>
      <div class="column">
        <h3>Done</h3>
        <div class="card">Logo & vibe</div>
        <div class="card">Dark theme</div>
      </div>
    </div>
  </section>

  <footer>©Hello. Build your universe.</footer>

  <script src="landingpage.js"></script>
</body>
</html>
